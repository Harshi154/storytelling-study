

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Story Learning App</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #667eea, #764ba2);
    color: white;
    text-align: center;
}

/* Header */
header {
    padding: 20px;
    font-size: 28px;
    font-weight: bold;
    letter-spacing: 1px;
}

/* Container */
.container {
    display: flex;
    justify-content: center;
    align-items: center;
    height: 80vh;
    gap: 40px;
}

/* Card Design */
.card {
    width: 250px;
    height: 300px;
    background: rgba(255,255,255,0.1);
    backdrop-filter: blur(10px);
    border-radius: 20px;
    cursor: pointer;
    transition: 0.4s;
    box-shadow: 0 8px 25px rgba(0,0,0,0.3);
    position: relative;
    overflow: hidden;
}

/* Hover effect */
.card:hover {
    transform: translateY(-15px) scale(1.05);
}

/* Glow effect */
.card::before {
    content: '';
    position: absolute;
    width: 100%;
    height: 100%;
    background: linear-gradient(120deg, transparent, rgba(255,255,255,0.4), transparent);
    top: -100%;
    left: 0;
    transition: 0.5s;
}

.card:hover::before {
    top: 100%;
}

/* Card Content */
.card h2 {
    margin-top: 100px;
    font-size: 28px;
}

/* Icons */
.icon {
    font-size: 50px;
    margin-top: 40px;
}

/* Footer */
footer {
    position: absolute;
    bottom: 10px;
    width: 100%;
    font-size: 14px;
}
</style>
</head>

<body>

<header>📚 Story Based Learning</header>

<div class="container">

    <div class="card" onclick="goToPage('python.html')">
        <div class="icon">🐍</div>
        <h2>Python</h2>
    </div>

    <div class="card" onclick="goToPage('wt.html')">
        <div class="icon">🌐</div>
        <h2>WT</h2>
    </div>

    <div class="card" onclick="goToPage('java.html')">
        <div class="icon">☕</div>
        <h2>Java</h2>
    </div>

</div>

<footer>✨ Learn with Stories | Interactive Education ✨</footer>

<script>
function goToPage(page) {
    window.location.href = page;
}
</script>

</body>
</html>
